---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nyanserv
spec:
  progressDeadlineSeconds: 600
  replicas: 1
  revisionHistoryLimit: 1
  selector:
    matchLabels:
      app: nyanserv
  strategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: nyanserv
    spec:
      containers:
        - image: localhost/nyancat-strace:latest
          securityContext:
            runAsUser: 65534
            runAsGroup: 65534
            privileged: false
            runAsNonRoot: true
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            procMount: Default
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: Localhost
              localhostProfile: profiles/seccomp-profile.json
              #type: RuntimeDefault
          resources:
            limits:
              cpu: 100m
              memory: 32Mi
            requests:
              cpu: 50m
              memory: 32Mi
          imagePullPolicy: Never
          name: nyanserv
          ports:
            - containerPort: 2323
              protocol: TCP
          startupProbe:
            failureThreshold: 3
            tcpSocket:
              port: 2323
            initialDelaySeconds: 5
            periodSeconds: 10
            successThreshold: 1
            timeoutSeconds: 1
          readinessProbe:
            failureThreshold: 3
            tcpSocket:
              port: 2323
            initialDelaySeconds: 5
            periodSeconds: 10
            successThreshold: 1
            timeoutSeconds: 1
          livenessProbe:
            failureThreshold: 3
            tcpSocket:
              port: 2323
            initialDelaySeconds: 15
            periodSeconds: 20
            successThreshold: 1
            timeoutSeconds: 1
          terminationMessagePath: /dev/termination-log
          terminationMessagePolicy: File
      dnsPolicy: ClusterFirst
      restartPolicy: Always
      schedulerName: default-scheduler
      terminationGracePeriodSeconds: 30
